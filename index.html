<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Elite Train</title>
    <meta
      name="description"
      content="Application mobile de suivi musculation avec progression, historique, timer de repos et mode iPhone."
    />
    <meta name="theme-color" content="#08110d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Elite Train" />
    <style>
      html,
      body,
      #app {
        margin: 0;
        min-height: 100%;
        background: #070908;
        color: #f5f7f6;
      }
    </style>
    <script>
      window.__ELITE_TRAIN_VERSION__ = "v32";
      (async () => {
        try {
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter(
                  (key) =>
                    key.startsWith("elite-train-iphone-cache-v") &&
                    key !== "elite-train-iphone-cache-v32"
                )
                .map((key) => caches.delete(key))
            );
          }
        } catch (_) {}
      })();
    </script>
    <link rel="manifest" href="./manifest.webmanifest?v=32" />
    <link rel="icon" href="./icon.svg?v=32" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg?v=32" />
    <link rel="stylesheet" href="./styles.css?v=32" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./app.js?v=32"></script>
  </body>
</html>
